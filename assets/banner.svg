<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1F2937" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Accent Gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="50%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    
    <linearGradient id="secondary-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
  </defs>

  <style>
    .title-text {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 800;
      fill: url(#primary-grad);
      font-size: 52px;
      letter-spacing: -1.5px;
    }
    .subtitle-text {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 400;
      fill: #9CA3AF;
      font-size: 18px;
      letter-spacing: 0.5px;
    }
    .accent-bar {
      height: 4px;
      fill: url(#primary-grad);
    }
    .pulse-node {
      animation: pulse 3s infinite ease-in-out;
    }
    .dash-line {
      stroke-dasharray: 8;
      animation: dash 30s linear infinite;
    }
    @keyframes pulse {
      0%, 100% { r: 6; opacity: 0.4; }
      50% { r: 12; opacity: 0.9; }
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -1000;
      }
    }
    .floating-circle {
      animation: float 6s infinite ease-in-out;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Animated Neural Net/Scaling Graph Elements (Dynamic Aspect) -->
  <g stroke="rgba(255, 255, 255, 0.1)" stroke-width="1.5">
    <line x1="800" y1="100" x2="950" y2="150" class="dash-line" stroke="#8B5CF6" />
    <line x1="950" y1="150" x2="1050" y2="80" class="dash-line" stroke="#EC4899" />
    <line x1="950" y1="150" x2="1100" y2="280" class="dash-line" stroke="#3B82F6" />
    <line x1="800" y1="300" x2="950" y2="150" class="dash-line" stroke="#10B981" />
  </g>

  <!-- Graph Nodes -->
  <circle cx="800" cy="100" r="8" fill="#8B5CF6" filter="url(#glow)" />
  <circle cx="800" cy="100" r="14" fill="none" stroke="#8B5CF6" stroke-width="1" class="pulse-node" />

  <circle cx="950" cy="150" r="10" fill="#EC4899" filter="url(#glow)" />
  <circle cx="950" cy="150" r="18" fill="none" stroke="#EC4899" stroke-width="1" class="pulse-node" style="animation-delay: -1s;" />

  <circle cx="1050" cy="80" r="7" fill="#3B82F6" filter="url(#glow)" />
  <circle cx="1050" cy="80" r="12" fill="none" stroke="#3B82F6" stroke-width="1" class="pulse-node" style="animation-delay: -2s;" />

  <circle cx="1100" cy="280" r="9" fill="#10B981" filter="url(#glow)" />
  <circle cx="1100" cy="280" r="16" fill="none" stroke="#10B981" stroke-width="1" class="pulse-node" style="animation-delay: -1.5s;" />

  <circle cx="800" cy="300" r="6" fill="#F59E0B" filter="url(#glow)" />
  <circle cx="800" cy="300" r="11" fill="none" stroke="#F59E0B" stroke-width="1" class="pulse-node" style="animation-delay: -0.5s;" />

  <!-- Scaling Curves Overlay (Chinchilla Optimal Frontier) -->
  <path d="M 750 350 Q 900 280 1150 250" fill="none" stroke="url(#secondary-grad)" stroke-width="4" stroke-linecap="round" filter="url(#glow)" />
  <path d="M 750 350 Q 880 200 1150 150" fill="none" stroke="url(#primary-grad)" stroke-width="3" stroke-linecap="round" opacity="0.6" />

  <!-- Typography Content -->
  <g transform="translate(80, 160)">
    <!-- Main Title -->
    <text class="title-text" x="0" y="0">CHINCHILLA SCALING</text>
    
    <!-- Subtitle -->
    <text class="subtitle-text" x="0" y="40">Evolution, Progression, &amp; Compute-Optimal Design</text>

    <!-- Colored Accent Bar -->
    <rect x="0" y="60" width="380" height="4" rx="2" fill="url(#primary-grad)" filter="url(#glow)" />

    <!-- Details/Metrics Tags -->
    <g transform="translate(0, 95)" font-family="monospace" font-size="12" fill="#E5E7EB" letter-spacing="1">
      <rect x="0" y="0" width="130" height="24" rx="12" fill="rgba(139, 92, 246, 0.15)" stroke="rgba(139, 92, 246, 0.3)" stroke-width="1" />
      <text x="15" y="16" fill="#A78BFA">PARAM ∝ C⁰.⁵</text>

      <rect x="145" y="0" width="130" height="24" rx="12" fill="rgba(16, 185, 129, 0.15)" stroke="rgba(16, 185, 129, 0.3)" stroke-width="1" />
      <text x="160" y="16" fill="#34D399">TOKENS ∝ C⁰.⁵</text>

      <rect x="290" y="0" width="110" height="24" rx="12" fill="rgba(236, 72, 153, 0.15)" stroke="rgba(236, 72, 153, 0.3)" stroke-width="1" />
      <text x="308" y="16" fill="#F472B6">N:D ≈ 1:20</text>
    </g>
  </g>
</svg>
